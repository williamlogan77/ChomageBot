name: compileall

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compileall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile-check the whole tree
        run: python -m compileall -q Bot/
